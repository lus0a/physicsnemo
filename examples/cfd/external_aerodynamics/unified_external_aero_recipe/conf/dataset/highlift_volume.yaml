# High-lift airplane volume dataset (compressible, DomainMesh)
# Loads .pdmsh files from PhysicsNeMo-HighLiftAeroML.
# Each case directory (e.g. geo_LHC001_AoA_4/) contains a DomainMesh .pdmsh.
# Interior: volume point cloud with fields in point_data.
# global_data: freestream conditions injected from metadata below.
# Splits are controlled by a manifest.json + train_split/val_split in the
# training config (see train_geotransolver_automotive_volume.yaml).

name: highlift_volume

train_datadir: ${dataset_paths.highlift_aero_ml}

# Freestream conditions — slug-inch-second-Rankine unit system
metadata:
  U_inf: [2672.95, 0.0, 186.92]   # 2679.505 in/s at AoA=4°
  p_inf: 176.352                   # 14.696 psi × 12 → slug/(in·s²)
  rho_inf: 1.3756e-6               # 0.002377 slug/ft³ → slug/in³
  T_inf: 518.67                    # [°R]
  L_ref: 1156.75                    # [in] — span

pipeline:
  reader:
    _target_: ${dp:DomainMeshReader}
    path: ${train_datadir}
    pattern: "**/*.pdmsh"
    subsample_n_points: ${sampling_resolution}
    extra_boundaries:
      stl_geometry:
        pattern: "*.stl.pmsh"
  # augmentations:
  #   - _target_: ${dp:RandomRotateMesh}
  #     axes: ["z"]
  #     transform_point_data: true
  #     transform_global_data: true
  #   - _target_: ${dp:RandomTranslateMesh}
  #     distribution:
  #       _target_: torch.distributions.Uniform
  #       low: [-1.0, -1.0, 0.0]
  #       high: [1.0, 1.0, 0.0]
  transforms:
    # - _target_: ${dp:CenterMesh}
    #   use_area_weighting: false
    # - _target_: ${dp:NonDimensionalizeByMetadata}
    #   fields:
    #     avg(P): pressure
    #     avg(T): temperature
    #     avg(rho): density
    #     avg(u): velocity
    #   association: point_data
    - _target_: ${dp:ComputeSDFFromBoundary}
      boundary_name: stl_geometry
      sdf_field: sdf
      normals_field: sdf_normals
      use_winding_number: true
    - _target_: ${dp:DropBoundary}
      names: [stl_geometry]
    - _target_: ${dp:RenameMeshFields}
      point_data:
        avg(P): pressure
        avg(T): temperature
        avg(rho): density
        avg(u): velocity
    # z-score normalization — leave empty until stats are computed
    # - _target_: ${dp:NormalizeMeshFields}
    #   association: point_data
    #   fields: {}
    # No terminal MeshToTensorDict / RestructureTensorDict: the volume YAML
    # already produces a DomainMesh natively. Each model YAML's
    # `forward_kwargs:` spec maps DomainMesh paths to its forward kwargs.

targets:
  pressure: scalar
  temperature: scalar
  density: scalar
  velocity: vector

metrics: [l1, l2, mae]
